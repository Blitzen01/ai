<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Greetings</title>
  <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #fdf2f8 0%, #ffffff 40%, #f3e8ff 100%);
    }

    .card-glow:hover {
      box-shadow: 0 20px 40px rgba(168, 85, 247, 0.25);
    }
  </style>
</head>

<body class="min-h-screen text-gray-800">

  <!-- HEADER -->
  <header class="text-center pt-24 pb-16 px-4">
    <h1 class="text-5xl md:text-6xl font-bold mb-4">
      My Greetings 💌
    </h1>
    <p class="text-gray-500 text-sm md:text-base">
      Every message has a meaning.
    </p>
  </header>

  <!-- GRID -->
  <main class="max-w-5xl mx-auto px-6 pb-20">
    <div id="greetingsGrid" class="grid gap-12 md:grid-cols-2"></div>
  </main>

  <footer class="text-center text-gray-400 text-sm pb-10">
    Made with ❤️
  </footer>

  <script>
    // 🔥 JUST ADD HERE NEXT TIME
    const greetings = [
      {
        file: "01.html",
        title: "For My Ai 💛",
        desc: "The beginning. A message filled with sincerity and love.",
        emoji: "🌻"
      },
      {
        file: "02.html",
        title: "Good Night, My Universe ❤️",
        desc: "A calm and heartfelt message before the day ends.",
        emoji: "🌌"
      },

      {
        file: "03.html",
        title: "Take Care Always 🌅",
        desc: "A reminder that I’m proud of you and to always take care.",
        emoji: "🌅"
        },
      {
        file: "04.html",
        title: "I’m Sorry 🤍",
        desc: "A sincere apology with reassurance and understanding.",
        emoji: "🌙"
      },
      // 👉 FUTURE:
      // {
      //   file: "03.html",
      //   title: "New Message",
      //   desc: "Your description here",
      //   emoji: "💖"
      // }

    ];

    const grid = document.getElementById("greetingsGrid");

    greetings.forEach((g, index) => {
      const card = document.createElement("a");
      card.href = g.file;

      card.className =
        "card-glow bg-white/80 backdrop-blur-lg rounded-3xl p-10 shadow-lg border border-white/50 transition duration-300 hover:-translate-y-3 block";

      card.innerHTML = `
        <div class="text-4xl mb-6">${g.emoji}</div>

        <h2 class="text-2xl md:text-3xl font-semibold mb-3">
          ${g.title}
        </h2>

        <p class="text-gray-500 text-sm leading-relaxed">
          ${g.desc}
        </p>

        <div class="mt-6 text-xs text-gray-400 uppercase tracking-widest">
          Message ${index + 1}
        </div>
      `;

      grid.appendChild(card);
    });
  </script>

</body>
</html>
